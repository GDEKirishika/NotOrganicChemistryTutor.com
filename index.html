<style>
    body {
        margin: 0;
        padding: 0;
        color: #e0e0e0;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        
        /* 1. This sets the solid dark background first so it's NEVER white */
        background-color: #0f0f12; 
        
        /* 2. This applies the gradient across the whole screen */
        background-image: radial-gradient(circle at top right, #1a1a2e, #0f0f12);
        background-attachment: fixed;
    }

    /* 3. This creates a separate layer for the logo so it doesn't break the background if the file is missing */
    body::before {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        width: 33.33%; /* 1/3 of the screen */
        height: 100%;
        /* Ensure the filename below matches your folder exactly */
        background-image: url('images/BPSU_logo.png'); 
        background-repeat: no-repeat;
        background-position: center;
        background-size: contain;
        opacity: 0.15; /* This makes the logo transparent */
        z-index: -1;   /* Puts it behind the text */
    }

    .id-badge {
        position: fixed;
        right: 0;
        top: 50%;
        transform: translateY(-50%);
        width: 3cm; 
        background: rgba(0, 0, 0, 0.9);
        border: 1px solid #FFD700;
        border-right: none;
        padding: 15px 5px;
        text-align: center;
        border-radius: 15px 0 0 15px;
        z-index: 9999;
        box-shadow: -5px 0 20px rgba(0,0,0,0.8);
    }

    .id-badge .my-name {
        color: #FFD700;
        font-weight: bold;
        font-size: 0.7rem;
        display: block;
        text-transform: uppercase;
    }

    .id-badge .my-number {
        color: #00FFFF;
        font-size: 0.8rem;
        display: block;
        margin-top: 5px;
    }

    /* --- Your Original Layout Styles --- */
    html { scroll-behavior: smooth; }
    nav { background-color: rgba(0, 0, 0, 0.9); padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #333; }
    .nav-logo { font-weight: bold; color: #FFD700; font-size: 1.2rem; }
    .cases-btn { background: linear-gradient(45deg, #ff8c00, #FFD700); color: black; padding: 10px 20px; border-radius: 25px; text-decoration: none; font-weight: bold; transition: 0.2s; }
    .container { display: flex; flex-wrap: wrap; }
    .left-column { flex: 1; padding: 30px; border-right: 2px solid #333; }
    .right-column { flex: 1.5; padding: 30px; text-align: center; position: sticky; top: 70px; height: 100vh; }
    .problem { color: #FFD700; font-size: 1.2em; font-weight: bold; }
    .step { color: #00FFFF; }
    .answer { color: #39FF14; font-weight: bold; }
    .question-block { margin-bottom: 40px; padding-bottom: 20px; border-bottom: 1px dashed #555; }
    .explanation { background-color: rgba(17, 17, 17, 0.8); padding: 25px; border-left: 4px solid #00FFFF; margin-bottom: 50px; border-radius: 0 15px 15px 0; }
    .jump-button { display: inline-block; background-color: #333; color: white; border: 1px solid #FFD700; padding: 8px 15px; margin-top: 10px; border-radius: 5px; text-decoration: none; }
    footer { text-align: center; padding: 20px; border-top: 2px solid #333; width: 100%; }
</style>
