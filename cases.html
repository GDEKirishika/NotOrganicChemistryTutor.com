<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Trigo Cases - NotOrganicChemistryTutor</title>
    <link rel="icon" type="image/ico" href="images/favicon.ico">
    <style>
        /* 1. THE MAIN BACKGROUND */
        body { 
            background-color: #0f0f12; /* This stops the 'white' screen */
            background-image: radial-gradient(circle at top right, #1a1a2e, #0f0f12);
            background-attachment: fixed;
            color: #e0e0e0; 
            font-family: 'Segoe UI', Arial, sans-serif; 
            margin: 0; 
            padding: 0; 
            position: relative;
            min-height: 100vh;
        }

        /* 2. THE WATERMARK (Adjusted for transparency) */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 35%; 
            height: 100%;
            background-image: url('images/BPSU_logo.png'); 
            background-repeat: no-repeat;
            background-position: center;
            background-size: contain;
            opacity: 0.08; /* Very faint watermark */
            z-index: 0; 
            pointer-events: none;
        }

        /* 3. THE FLOATING BADGE */
        .id-badge {
            position: fixed;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 3cm; 
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid #FFD700;
            border-right: none;
            padding: 15px 5px;
            text-align: center;
            border-radius: 10px 0 0 10px;
            z-index: 9999;
        }

        .id-badge .my-name {
            color: #FFD700;
            font-weight: bold;
            font-size: 0.7rem;
            display: block;
            text-transform: uppercase;
        }

        .id-badge .my-number {
            color: #00FFFF;
            font-size: 0.8rem;
            display: block;
            margin-top: 5px;
        }

        /* 4. LAYOUT STRUCTURE */
        header { 
            background: #16213e; 
            padding: 20px; 
            text-align: center; 
            border-bottom: 2px solid #FFD700; 
            position: relative;
            z-index: 10;
        }

        .container { 
            display: flex; 
            flex-wrap: wrap; 
            position: relative;
            z-index: 5;
        }
        
        .solving-column { 
            flex: 2; 
            padding: 40px; 
            background: transparent; /* Allows logo to show through */
        }

        .cases-column { 
            flex: 1; 
            padding: 20px; 
            background: rgba(26, 26, 32, 0.85); /* Semi-transparent dark */
            border-left: 1px solid #333; 
            position: sticky; 
            top: 0; 
            height: 100vh; 
            overflow-y: auto; 
        }

        /* Your Math Card Styles */
        .solution-card { background: rgba(22, 22, 29, 0.9); border-radius: 15px; padding: 25px; margin-bottom: 40px; border: 1px solid #333; }
        .math-block { font-family: "Consolas", monospace; background: #000; padding: 15px; border-radius: 10px; color: #39FF14; line-height: 1.6; border-left: 4px solid #FFD700; }
        .case-badge { background: #FFD700; color: black; padding: 2px 6px; border-radius: 4px; font-weight: bold; margin-right: 8px; font-size: 0.75em; }
        .back-btn { color: #FFD700; text-decoration: none; border: 1px solid #FFD700; padding: 5px 10px; border-radius: 5px; position: absolute; left: 20px; top: 25px; }

        @media (max-width: 900px) { .cases-column { position: relative; height: auto; border-left: none; } }
    </style>
</head>
<body>

    <div class="id-badge">
        <span class="my-name">MATALOG, KIAN CARLO S.</span>
        <span class="my-number">25-01218</span>
    </div>

    <header>
        <a href="index.html" class="back-btn">← Back</a>
        <h1>Trigonometric Integration Roadmap</h1>
    </header>

    <div class="container">
        <div class="solving-column">
            <div class="solution-card">
                <h2><span class="case-badge">CASE 1</span>Sin/Cos ODD</h2>
                <div class="math-block">
                    &int; sin³(x) dx = &int; (1 - cos²x) sin(x) dx
                </div>
            </div>
        </div>

        <div class="cases-column">
            <h3 style="color:#FFD700;">Quick Reference</h3>
            <p>Formulas for Case 1 and Case 2 go here.</p>
        </div>
    </div>

</body>
</html>
